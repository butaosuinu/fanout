name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Tier 1 + Tier 2
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install bats / jq / shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y bats jq shellcheck

      - name: Tier 1 tests
        run: make test-tier1

      - name: Tier 2 tests
        run: make test-tier2

      - name: Lint
        run: make lint
